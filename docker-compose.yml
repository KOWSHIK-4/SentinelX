version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sentinelx-db
    environment:
      POSTGRES_USER: sentinelx
      POSTGRES_PASSWORD: sentinelx_secret
      POSTGRES_DB: sentinelx
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sentinelx']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: sentinelx-api
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://sentinelx:sentinelx_secret@postgres:5432/sentinelx?schema=public
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: http://localhost:80
    ports:
      - '5000:5000'
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: sentinelx-ui
    ports:
      - '80:80'
    depends_on:
      - backend

volumes:
  postgres_data:
